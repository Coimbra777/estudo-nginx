services:
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./projeto-laravel:/var/www
    depends_on:
      - laravel
      - users_service
      - orders_service
    networks:
      - microservices-network

  laravel:
    build:
      context: ./projeto-laravel
      dockerfile: Dockerfile
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./projeto-laravel:/var/www
    depends_on:
      - mysql-laravel
      - redis
    networks:
      - microservices-network

  orders_service:
    build:
      context: ./projeto-nest-1
      dockerfile: Dockerfile
    container_name: orders_service
    working_dir: /app
    volumes:
      - ./projeto-nest-1:/app
      - /app/node_modules
    environment:
      - PORT=3000
    command: npm run start:dev
    networks:
      - microservices-network

  users_service:
    build:
      context: ./nestjs-boilerplate-api
      dockerfile: Dockerfile
    container_name: users_service
    working_dir: /app
    volumes:
      - ./nestjs-boilerplate-api:/app
      - /app/node_modules
    environment:
      - PORT=3001
    command: npm run start:dev
    networks:
      - microservices-network

  mysql-laravel:
    image: mysql:5.7
    container_name: mysql_laravel
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_laravel_data:/var/lib/mysql
    networks:
      - microservices-network

  redis:
    image: redis:alpine
    container_name: redis_shared
    ports:
      - "6379:6379"
    networks:
      - microservices-network

volumes:
  mysql_laravel_data:

networks:
  microservices-network:
    driver: bridge
