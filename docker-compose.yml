services:
  nginx:
    image: nginx:latest
    container_name: nginx_gateway
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./laravel-app:/var/www/laravel
    depends_on:
      - laravel
      - node1
      - node2
    networks:
      - app-network

  laravel:
    build:
      context: ./laravel-app
      dockerfile: Dockerfile
    container_name: laravel_app
    volumes:
      - ./laravel-app:/var/www/laravel
    networks:
      - app-network

  node1:
    build:
      context: ./node-app
      dockerfile: Dockerfile
    container_name: node_app_1
    environment:
      - PORT=3000
    networks:
      - app-network

  node2:
    build:
      context: ./node-app
      dockerfile: Dockerfile
    container_name: node_app_2
    environment:
      - PORT=3000
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
